<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWA Shop - Products</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="bg-primary text-white text-center py-3">
    <h1>PWA Shop</h1>
    <a href="cart.html" class="btn btn-light mt-2">View Cart (<span id="cart-count">0</span>)</a>
</header>

<main class="container mt-4">
    <div class="row" id="products-container"></div>
</main>

<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Register service worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.error('Service Worker Failed:', err));
    }

    // Request push notification permission
    Notification.requestPermission().then(permission => {
        if(permission === 'granted') console.log('Push notifications enabled!');
    });
});
</script>
</body>
</html>
